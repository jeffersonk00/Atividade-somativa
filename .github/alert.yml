name: Discord Alert

on:
  push:
    branches: [ main ]

jobs:
  notify:
    runs-on: ubuntu-latest

    steps:
      - name: Send Discord message
        run: |
          curl -X POST -H "Content-Type: application/json" \
          -d '{"content": "🚀 Novo commit enviado!"}' \
          ${{ secrets.DISCORD_WEBHOOK }}