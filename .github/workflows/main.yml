name: CI-CD

on:
  push:
    branches: [ main, desenvolvimento, feature-ci-cd ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Build
      run: echo "Build executado com sucesso"

  deploy:
    runs-on: ubuntu-latest
    needs: build

    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Deploy
      run: echo "Deploy executado com sucesso"